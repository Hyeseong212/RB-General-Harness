<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">이승로봇 게임재활 데이터 플로우 차트 V2</title>
  <desc id="desc">화면 입력, API write와 read, 저장 테이블, 조회 화면을 분리한 데이터 플로우 샘플</desc>
  <defs>
    <marker id="arrowWrite" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#24a36b"/>
    </marker>
    <marker id="arrowRead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#356ae6"/>
    </marker>
    <marker id="arrowSafety" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b4a"/>
    </marker>
    <style><![CDATA[
      svg { background: #f7f8f3; font-family: Pretendard, "Noto Sans KR", Arial, sans-serif; }
      text { fill: #17202a; letter-spacing: 0; }
      .eyebrow { font-size: 18px; font-weight: 900; fill: #0f6a4a; }
      .title { font-size: 52px; font-weight: 900; }
      .sub { font-size: 23px; fill: #65717d; }
      .lane-title { font-size: 22px; font-weight: 900; fill: #0f6a4a; }
      .node-title { font-size: 23px; font-weight: 900; }
      .node-body { font-size: 17px; fill: #65717d; }
      .small { font-size: 16px; fill: #65717d; }
      .tag { font-size: 14px; font-weight: 900; }
      .lane { fill: #ffffff; stroke: #d9e1d7; stroke-width: 2; rx: 24; ry: 24; }
      .node { fill: #ffffff; stroke: #d9e1d7; stroke-width: 2; rx: 18; ry: 18; }
      .green { fill: #e2f7ec; stroke: #24a36b; }
      .blue { fill: #e8eeff; stroke: #356ae6; }
      .coral { fill: #ffe8df; stroke: #ff6b4a; }
      .yellow { fill: #fff5cc; stroke: #f6c344; }
      .slate { fill: #eef2f4; stroke: #98a4ae; }
      .store { fill: #ffffff; stroke: #111a24; stroke-width: 2; rx: 18; ry: 18; }
      .write { fill: none; stroke: #24a36b; stroke-width: 4; marker-end: url(#arrowWrite); }
      .read { fill: none; stroke: #356ae6; stroke-width: 4; marker-end: url(#arrowRead); }
      .safety { fill: none; stroke: #ff6b4a; stroke-width: 4; marker-end: url(#arrowSafety); }
      .muted-flow { fill: none; stroke: #98a4ae; stroke-width: 3; stroke-dasharray: 7 7; marker-end: url(#arrowRead); }
      .dash { stroke-dasharray: 7 7; }
    ]]></style>
  </defs>

  <rect width="1920" height="1080" fill="#f7f8f3"/>
  <text x="96" y="84" class="eyebrow">fifth acting output · revised</text>
  <text x="96" y="152" class="title">데이터 플로우 차트 V2</text>
  <text x="100" y="198" class="sub">상태 흐름이 아니라, 어떤 입력이 어떤 API를 통해 어떤 테이블에 쓰이고 어떤 화면에서 읽히는지 분리</text>

  <g transform="translate(84 244)">
    <rect class="lane" x="0" y="0" width="392" height="708"/>
    <text x="30" y="44" class="lane-title">1. 입력 / 트리거</text>

    <rect class="node green" x="30" y="76" width="326" height="82"/>
    <text x="54" y="111" class="node-title">운동 기준 데이터</text>
    <text x="54" y="140" class="node-body">Exercise.reviewStatus, safetyCopy</text>

    <rect class="node green" x="30" y="188" width="326" height="116"/>
    <text x="54" y="224" class="node-title">환자 앱 액션</text>
    <text x="54" y="254" class="node-body">P-01 tapExercise</text>
    <text x="54" y="282" class="node-body">P-02 tapStart, P-05 complete</text>

    <rect class="node blue" x="30" y="334" width="326" height="116"/>
    <text x="54" y="370" class="node-title">타이머 / 센서 입력</text>
    <text x="54" y="400" class="node-body">timer_tick</text>
    <text x="54" y="428" class="node-body">movement_tick</text>

    <rect class="node coral" x="30" y="480" width="326" height="116"/>
    <text x="54" y="516" class="node-title">중단 입력</text>
    <text x="54" y="546" class="node-body">pain, fatigue, dizziness</text>
    <text x="54" y="574" class="node-body">reason, memo</text>

    <rect class="node slate" x="30" y="626" width="326" height="56"/>
    <text x="54" y="662" class="node-title">치료사 메모 입력</text>
  </g>

  <g transform="translate(558 244)">
    <rect class="lane" x="0" y="0" width="394" height="708"/>
    <text x="30" y="44" class="lane-title">2. API / 이벤트 처리</text>

    <rect class="node blue" x="30" y="76" width="334" height="64"/>
    <text x="54" y="114" class="node-title">GET /exercises</text>

    <rect class="node green" x="30" y="178" width="334" height="82"/>
    <text x="54" y="212" class="node-title">POST /sessions</text>
    <text x="54" y="238" class="node-body">createSession, state=ACTIVE</text>

    <rect class="node blue" x="30" y="294" width="334" height="96"/>
    <text x="54" y="330" class="node-title">POST /event-logs</text>
    <text x="54" y="358" class="node-body">timer_tick, movement_tick</text>

    <rect class="node coral" x="30" y="424" width="334" height="86"/>
    <text x="54" y="458" class="node-title">POST /safety-inputs</text>
    <text x="54" y="484" class="node-body">stop_reason_saved</text>

    <rect class="node yellow" x="30" y="540" width="334" height="64"/>
    <text x="54" y="579" class="node-title">PATCH /sessions/{id}</text>

    <rect class="node slate" x="30" y="634" width="334" height="48"/>
    <text x="54" y="665" class="node-title">POST /therapist-memos</text>
  </g>

  <g transform="translate(1036 244)">
    <rect class="lane" x="0" y="0" width="354" height="708"/>
    <text x="30" y="44" class="lane-title">3. 저장 테이블</text>

    <rect class="store" x="36" y="76" width="284" height="80"/>
    <text x="62" y="110" class="node-title">Exercise</text>
    <text x="62" y="138" class="node-body">운동명, 검토상태, 주의문구</text>

    <rect class="store" x="36" y="192" width="284" height="96"/>
    <text x="62" y="226" class="node-title">Session</text>
    <text x="62" y="254" class="node-body">sessionId, exerciseId</text>
    <text x="62" y="278" class="node-body">state, startedAt, completedAt</text>

    <rect class="store" x="36" y="324" width="284" height="96"/>
    <text x="62" y="358" class="node-title">EventLog</text>
    <text x="62" y="386" class="node-body">eventName, payload</text>
    <text x="62" y="410" class="node-body">timestamp</text>

    <rect class="store" x="36" y="456" width="284" height="96"/>
    <text x="62" y="490" class="node-title">SafetyInput</text>
    <text x="62" y="518" class="node-body">pain, fatigue, dizziness</text>
    <text x="62" y="542" class="node-body">reason, memo</text>

    <rect class="store" x="36" y="588" width="284" height="72"/>
    <text x="62" y="622" class="node-title">TherapistMemo</text>
    <text x="62" y="650" class="node-body">sessionId, body, authorRole</text>
  </g>

  <g transform="translate(1472 244)">
    <rect class="lane" x="0" y="0" width="360" height="708"/>
    <text x="30" y="44" class="lane-title">4. 화면 조회 / 출력</text>

    <rect class="node blue" x="32" y="76" width="296" height="96"/>
    <text x="58" y="112" class="node-title">P-01 운동 목록</text>
    <text x="58" y="142" class="node-body">Exercise read</text>
    <text x="58" y="166" class="node-body">requiresReview 차단</text>

    <rect class="node yellow" x="32" y="244" width="296" height="118"/>
    <text x="58" y="280" class="node-title">P-05 완료 요약</text>
    <text x="58" y="310" class="node-body">Session + EventLog</text>
    <text x="58" y="338" class="node-body">SafetyInput 요약 표시</text>

    <rect class="node blue" x="32" y="434" width="296" height="128"/>
    <text x="58" y="470" class="node-title">T-01 세션 상세</text>
    <text x="58" y="500" class="node-body">sessionId 기준 조회</text>
    <text x="58" y="528" class="node-body">타임라인, 중단 입력, 메모</text>

    <rect class="node coral" x="32" y="612" width="296" height="70"/>
    <text x="58" y="648" class="node-title">재활 전문가 확인</text>
    <text x="58" y="674" class="node-body">입력 범위, 중단 기준</text>
  </g>

  <path class="read" d="M 440 361 C 502 361, 502 352, 588 352"/>
  <path class="write" d="M 440 490 C 508 490, 508 463, 588 463"/>
  <path class="read" d="M 440 636 C 508 636, 508 586, 588 586"/>
  <path class="safety" d="M 440 782 C 508 782, 508 711, 588 711"/>
  <path class="write" d="M 440 898 C 510 898, 510 902, 588 902"/>

  <path class="read" d="M 922 352 C 966 352, 966 360, 1072 360"/>
  <path class="write" d="M 922 463 C 974 463, 974 484, 1072 484"/>
  <path class="read" d="M 922 586 C 974 586, 974 616, 1072 616"/>
  <path class="safety" d="M 922 711 C 974 711, 974 748, 1072 748"/>
  <path class="write" d="M 922 816 C 976 816, 976 504, 1072 504"/>
  <path class="write" d="M 922 902 C 976 902, 976 868, 1072 868"/>

  <path class="read" d="M 1320 360 C 1388 360, 1388 368, 1504 368"/>
  <path class="read" d="M 1320 484 C 1400 484, 1400 546, 1504 546"/>
  <path class="read" d="M 1320 616 C 1400 616, 1400 564, 1504 564"/>
  <path class="safety" d="M 1320 748 C 1400 748, 1400 584, 1504 584"/>

  <path class="read dash" d="M 1320 484 C 1400 484, 1400 742, 1504 742"/>
  <path class="read dash" d="M 1320 616 C 1400 616, 1400 764, 1504 764"/>
  <path class="safety dash" d="M 1320 748 C 1400 748, 1400 784, 1504 784"/>
  <path class="read dash" d="M 1320 868 C 1400 868, 1400 802, 1504 802"/>

  <g transform="translate(104 980)">
    <rect x="0" y="0" width="1710" height="50" rx="14" fill="#ffffff" stroke="#d9e1d7" stroke-width="2"/>
    <line x1="28" y1="25" x2="84" y2="25" class="write"/>
    <text x="106" y="31" class="small">write: 화면 액션과 센서 입력이 저장 테이블을 변경</text>
    <line x1="550" y1="25" x2="606" y2="25" class="read"/>
    <text x="628" y="31" class="small">read: 화면이 sessionId 또는 exerciseId 기준으로 조회</text>
    <line x1="1102" y1="25" x2="1158" y2="25" class="safety"/>
    <text x="1180" y="31" class="small">safety: 중단 입력과 전문가 확인 필요 데이터</text>
  </g>

  <text x="96" y="1054" class="small">데이터 플로우 샘플 V2 | 실제 DB 스키마 확정본 아님 | 센서 입력·중단 기준·피드백 문구는 재활 전문가 확인 필요</text>
</svg>
