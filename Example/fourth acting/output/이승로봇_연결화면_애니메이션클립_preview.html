<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>이승로봇 연결 화면 애니메이션 클립 프리뷰</title>
  <style>
    body {
      margin: 0;
      background: #f7f8f3;
      color: #17202a;
      font-family: Pretendard, "Noto Sans KR", Arial, sans-serif;
    }
    main {
      width: min(100vw, 1600px);
      margin: 0 auto;
      padding: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 20px;
      color: #65717d;
      font-size: 15px;
    }
    .stage {
      border: 1px solid #d9e1d7;
      background: #ffffff;
      border-radius: 10px;
      overflow: hidden;
    }
    object {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
    }
  </style>
</head>
<body>
  <main>
    <h1>연결 화면 애니메이션 클립</h1>
    <p>SVG(XML) 파일을 그대로 불러와 보는 프리뷰입니다. 18초 루프로 P-01부터 P-05까지 화면 전환과 이벤트를 확인합니다.</p>
    <div class="stage">
      <object data="./이승로봇_연결화면_애니메이션클립.svg" type="image/svg+xml" aria-label="이승로봇 연결 화면 애니메이션 클립"></object>
    </div>
  </main>
</body>
</html>
